version: '3.8'

services:
  # Base de datos MySQL
  database:
    image: mysql:8.0
    container_name: portafolio_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: portafolio_drupal
      MYSQL_USER: drupal_user
      MYSQL_PASSWORD: drupal_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP con Drupal
  web:
    image: php:8.2-fpm
    container_name: portafolio_web
    working_dir: /app
    volumes:
      - .:/app
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      DB_HOST: database
      DB_NAME: portafolio_drupal
      DB_USER: drupal_user
      DB_PASS: drupal_password
    depends_on:
      database:
        condition: service_healthy
    networks:
      - drupal_network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: portafolio_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/app
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - drupal_network

  # Mailhog (para pruebas de correos)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: portafolio_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - drupal_network

volumes:
  db_data:

networks:
  drupal_network:
    driver: bridge
